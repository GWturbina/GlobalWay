<!-- Matrix Component -->
<div class="matrix-content">
  <!-- Matrix Navigation -->
  <div class="cosmic-card">
    <h3>🔍 <span data-translate="matrix_navigation">Matrix Navigation</span></h3>
    <div class="search-container">
      <input type="text" id="searchMatrixId" placeholder="🔍 Search by ID..." class="search-input">
      <button id="searchMatrixBtn" class="search-btn">
        <span data-translate="search">Search</span>
      </button>
    </div>
    <div class="matrix-controls">
      <button id="resetMatrixView" class="control-btn">
        🏠 <span data-translate="home">Home</span>
      </button>
      <button id="matrixFullscreen" class="control-btn">
        🖥️ <span data-translate="fullscreen">Fullscreen</span>
      </button>
    </div>
  </div>
  
  <!-- Matrix Data Container -->
  <div class="cosmic-card">
    <h3>🌌 <span data-translate="matrix_data">Matrix Data</span></h3>
    <div id="matrixContainer" class="matrix-container">
      <!-- Данные будут загружены через JS -->
    </div>
  </div>
  
  <!-- Matrix Level Selector -->
  <div class="cosmic-card">
    <h3>📊 <span data-translate="matrix_levels">Matrix Levels</span></h3>
    <div class="matrix-level-scroll">
      <div class="matrix-level-selector">
        <button class="level-selector-btn active" data-level="1">Level 1</button>
        <button class="level-selector-btn" data-level="2">Level 2</button>
        <button class="level-selector-btn" data-level="3">Level 3</button>
        <button class="level-selector-btn" data-level="4">Level 4</button>
        <button class="level-selector-btn" data-level="5">Level 5</button>
        <button class="level-selector-btn" data-level="6">Level 6</button>
        <button class="level-selector-btn" data-level="7">Level 7</button>
        <button class="level-selector-btn" data-level="8">Level 8</button>
        <button class="level-selector-btn" data-level="9">Level 9</button>
        <button class="level-selector-btn" data-level="10">Level 10</button>
        <button class="level-selector-btn" data-level="11">Level 11</button>
        <button class="level-selector-btn" data-level="12">Level 12</button>
      </div>
    </div>
  </div>
</div>
