<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GlobalWay - Децентрализованная глобальная платформа">
    <title>GlobalWay DApp</title>
    
    <!-- Icons -->
    <link rel="icon" type="image/x-icon" href="assets/icons/favicon.ico">
    <link rel="apple-touch-icon" sizes="192x192" href="assets/icons/icon-192x192.png">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/components.css">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#0a0a2e">
</head>
<body class="cosmic-background">
    <div id="app">
        <!-- Landing Container -->
        <div id="landing-container" class="landing-container">
            <!-- Language Switcher -->
            <div class="language-switcher">
                <button class="lang-btn active" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="ru">RU</button>
                <button class="lang-btn" data-lang="ua">UA</button>
            </div>
            
            <!-- Floating Planets -->
            <div class="planets-wrapper">
                <div class="planet-wrapper planet-club">
                    <div class="planet-image"></div>
                    <div class="planet-info">
                        <span data-i18n="club.title">Клуб GlobalWay</span>
                    </div>
                </div>
                
                <div class="planet-wrapper planet-mission">
                    <div class="planet-image"></div>
                    <div class="planet-info">
                        <span data-i18n="mission.title">Наша Миссия</span>
                    </div>
                </div>
                
                <div class="planet-wrapper planet-goals">
                    <div class="planet-image"></div>
                    <div class="planet-info">
                        <span data-i18n="goals.title">Цели Клуба</span>
                    </div>
                </div>
                
                <div class="planet-wrapper planet-roadmap">
                    <div class="planet-image"></div>
                    <div class="planet-info">
                        <span data-i18n="roadmap.title">Дорожная Карта</span>
                    </div>
                </div>
                
                <div class="planet-wrapper planet-projects">
                    <div class="planet-image"></div>
                    <div class="planet-info">
                        <span data-i18n="projects.title">Наши Проекты</span>
                    </div>
                </div>
            </div>
            
            <!-- GWT Coin -->
            <div class="gwt-coin">
                <div class="gwt-coin-image"></div>
                <div class="gwt-coin-label" data-i18n="openDapp">GWT Coin</div>
            </div>
            
            <!-- Enter DApp Button -->
            <div class="enter-dapp-section">
                <button id="open-dapp-btn" class="enter-dapp-btn">
                    <span data-i18n="openDapp">ВХОД В DAPP</span>
                </button>
            </div>
        </div>
    </div>
    
    <!-- Scripts -->
    <script src="js/i18n.js"></script>
    <script src="js/id-generator.js"></script>
    <script src="js/web3-manager.js"></script>
    <script src="js/contracts.js"></script>
    <script src="js/contract-manager.js"></script>
    <script src="js/ui-controller.js"></script>
    <script src="js/landing-controller.js"></script>
    <script src="js/dashboard-controller.js"></script>
    <script src="js/partners-controller.js"></script>
    <script src="js/matrix-controller.js"></script>
    <script src="js/tokens-controller.js"></script>
    <script src="js/projects-controller.js"></script>
    <script src="js/admin-controller.js"></script>
    <script src="js/app.js"></script>
    
    <script>
        // Initialize Landing Controller
        document.addEventListener('DOMContentLoaded', () => {
            window.landingController = new LandingController();
        });
    </script>
</body>
</html>
