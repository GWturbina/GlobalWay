<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GlobalWay</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/assets/icons/favicon.ico" />
  <link rel="stylesheet" href="/src/css/styles.css" />
  <link rel="stylesheet" href="/src/css/animations.css" />
  <link rel="stylesheet" href="/src/css/responsive.css" />
</head>
<body>
  <header class="gw-topbar app-header">
    <div class="header-content">
      <div class="logo">
        <img class="logo-img" src="/assets/user-icons/logo.png" alt="logo" />
        <div class="logo-text"><h1>GlobalWay</h1><span class="tagline">Your Global Path</span></div>
      </div>
      <div class="header-actions">
        <div class="network-indicator"><span class="network-status">opBNB</span></div>
        <button id="connectBtn" class="connect-wallet-btn">Connect Wallet</button>
        <select id="langSelect" class="language-select">
          <option value="en">EN</option>
          <option value="uk">UA</option>
          <option value="ru" selected>RU</option>
        </select>
      </div>
    </div>
    <nav class="nav" style="display:none">
      <a href="#/dashboard" data-route>Dashboard</a>
      <a href="#/partners"  data-route>Partners</a>
      <a href="#/matrix"    data-route>Matrix</a>
      <a href="#/tokens"    data-route>Tokens</a>
      <a href="#/projects"  data-route>Projects</a>
      <a href="#/settings"  data-route>Settings</a>
      <a href="#/admin"     data-route class="admin-only" style="display:none">Admin</a>
    </nav>
  </header>

  <main id="app" class="gw-container main-content"></main>

  <footer class="gw-footer" style="visibility:hidden">
    <span>opBNB · SafePal-first · © GlobalWay</span>
  </footer>

  <nav class="bottom-nav">
    <a class="nav-btn" href="#/dashboard"><img class="nav-icon" src="/assets/icons/dashboard.png" alt=""><span class="nav-text" data-translate="dashboard">Дашборд</span></a>
    <a class="nav-btn" href="#/partners"><img class="nav-icon" src="/assets/icons/users.png" alt=""><span class="nav-text" data-translate="partners">Партнёры</span></a>
    <a class="nav-btn" href="#/matrix"><img class="nav-icon" src="/assets/icons/matrix.png" alt=""><span class="nav-text" data-translate="matrix">Матр.</span></a>
    <a class="nav-btn" href="#/tokens"><img class="nav-icon" src="/assets/icons/tokens.png" alt=""><span class="nav-text" data-translate="tokens">Токены</span></a>
    <a class="nav-btn" href="#/projects"><img class="nav-icon" src="/assets/icons/projects.png" alt=""><span class="nav-text" data-translate="projects">Проекты</span></a>
    <a class="nav-btn admin-only" href="#/admin"><img class="nav-icon" src="/assets/icons/settings.png" alt=""><span class="nav-text" data-translate="admin">Админ</span></a>
  </nav>

  <!-- Подключение библиотек и скриптов -->
  <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
  <script src="/src/js/i18n.js"></script>
  <script src="/src/js/router.js"></script>
  <script src="/src/js/glue.js"></script>
  <script src="/src/js/web3.js"></script>
  <script src="/src/js/contracts.js"></script>
  <script src="/src/js/ui.js"></script>
  <script src="/src/js/app.js"></script>

  <!-- Регистрация Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker
        .register('/sw.js')
        .then(() => console.log('✅ Service Worker зарегистрирован'))
        .catch(err => console.error('❌ Ошибка регистрации SW', err));
    }
  </script>
</body>
</html>
