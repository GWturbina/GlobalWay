<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GlobalWay - Decentralized Marketing Platform">
    <title>GlobalWay - Global Club Network</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="assets/icons/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/icon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/icon-32x32.png">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/animations.css">
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#001a33">
</head>
<body>
    <!-- Загрузочный экран -->
    <div class="loader" id="loader">
        <div class="loader-content">
            <img src="assets/icons/logo-192x192.png" alt="GlobalWay" class="loader-logo">
            <div class="loader-text">Loading GlobalWay...</div>
        </div>
    </div>

    <!-- Фоновое изображение -->
    <div class="main-background"></div>
    
    <!-- Контейнер для планет -->
    <div class="planets-container" id="planetsContainer">
        <!-- Планета Клуб -->
        <div class="planet planet-club" data-planet="club">
            <img src="assets/planets/planet-club.png" alt="GlobalWay Club">
        </div>
        
        <!-- Планета Цели -->
        <div class="planet planet-goals" data-planet="goals">
            <img src="assets/planets/planet-goals.png" alt="Club Goals">
        </div>
        
        <!-- Планета Миссия -->
        <div class="planet planet-mission" data-planet="mission">
            <img src="assets/planets/planet-mission.png" alt="Our Mission">
        </div>
        
        <!-- Планета Проекты -->
        <div class="planet planet-projects" data-planet="projects">
            <img src="assets/planets/planet-projects.png" alt="Our Projects">
        </div>
        
        <!-- Планета Дорожная карта -->
        <div class="planet planet-roadmap" data-planet="roadmap">
            <img src="assets/planets/planet-roadmap.png" alt="Roadmap">
        </div>
    </div>
    
    <!-- Вход в Dapp -->
    <div class="dapp-entrance" id="dappEntrance">
        <img src="assets/planets/gwt-coin.png" alt="GWT Token">
        <div class="dapp-entrance-text" data-i18n="main.open_dapp">Open Dapp</div>
    </div>
    
    <!-- Модальное окно для планет -->
    <div class="modal" id="planetModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle"></h2>
                <span class="modal-close">&times;</span>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>
    
    <!-- Выбор языка -->
    <div class="language-selector">
        <select id="languageSelect">
            <option value="en">English</option>
            <option value="ru">Русский</option>
            <option value="uk">Українська</option>
        </select>
    </div>
    
    <!-- JavaScript -->
    <script src="js/i18n.js"></script>
    <script src="js/app.js"></script>
    <script src="js/web3.js"></script>
    <script src="js/ui.js"></script>
    
    <script>
        // Инициализация при загрузке
        document.addEventListener('DOMContentLoaded', function() {
            // Скрыть загрузчик
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
            }, 1500);
            
            // Инициализация планет
            initializePlanets();
            
            // Вход в Dapp
            document.getElementById('dappEntrance').addEventListener('click', function() {
                window.location.href = 'components/dashboard.html';
            });
        });
        
        // Инициализация планет
        function initializePlanets() {
            const planets = document.querySelectorAll('.planet');
            const modal = document.getElementById('planetModal');
            const modalClose = document.querySelector('.modal-close');
            
            planets.forEach(planet => {
                planet.addEventListener('click', function() {
                    const planetType = this.dataset.planet;
                    showPlanetInfo(planetType);
                });
            
            // Закрытие модального окна
            modalClose.addEventListener('click', function() {
                modal.style.display = 'none';
            });
            
            window.addEventListener('click', function(event) {
                if (event.target == modal) {
                    modal.style.display = 'none';
                }
            });
        }
        
        // Показ информации о планете
        function showPlanetInfo(planetType) {
            const modal = document.getElementById('planetModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalBody = document.getElementById('modalBody');
            
            // Получение текущего языка
            const currentLang = localStorage.getItem('language') || 'en';
            const planetData = i18n[currentLang][planetType];
            
            modalTitle.textContent = planetData.title;
            modalBody.textContent = planetData.text;
            
            modal.style.display = 'block';
        }
    </script>
</body>
</html>
