<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GlobalWay - Your Global Path</title>

  <!-- PWA -->
  <meta name="theme-color" content="#FFD700"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" href="assets/icons/favicon.ico"/>

  <!-- Web3 -->
  <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>

  <style>
    /* ====== ОСНОВНЫЕ СТИЛИ ====== */
    :root {
      --primary-bg: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
      --card-bg: rgba(26, 26, 46, 0.95);
      --accent-gold: #FFD700;
      --text-primary: #FFFFFF;
      --text-secondary: #B0B0B0;
      --success: #00FF88;
      --error: #FF4444;
      --spacing-md: 15px;
      --border-radius: 20px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--primary-bg);
      background-image: url('assets/images/background.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .app-container {
      display: none;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ====== КОСМИЧЕСКОЕ ИНТРО ====== */
    #cosmic-intro {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 1s ease, transform 1s ease;
    }

    #cosmic-intro.hidden {
      opacity: 0;
      transform: scale(0.95);
      pointer-events: none;
    }

    .cosmic-planets-container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    .cosmic-planet {
      position: absolute;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      user-select: none;
      z-index: 100;
    }

    .cosmic-planet:hover {
      transform: scale(1.1);
    }

    .planet-emoji {
      font-size: 32px;
      margin-bottom: 5px;
    }

    .planet-title {
      color: white;
      font-weight: bold;
      text-align: center;
      text-shadow: 0 0 10px rgba(0,0,0,0.8);
      font-size: 14px;
    }

    .intro-language-selector {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 10px;
      z-index: 10001;
    }

    .intro-lang-btn {
      padding: 8px 12px;
      border: 2px solid white;
      background: rgba(255,255,255,0.1);
      color: white;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s ease;
    }

    .intro-lang-btn.active {
      background: var(--accent-gold);
      color: black;
    }

    .skip-btn {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      background: var(--accent-gold);
      color: black;
      border: none;
      border-radius: 25px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .skip-btn:hover {
      background: #FFA500;
    }

    /* ====== МОДАЛЬНОЕ ОКНО ====== */
    .cosmic-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      z-index: 10000;
    }

    .cosmic-modal.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-content {
      background: var(--card-bg);
      border: 2px solid var(--accent-gold);
      border-radius: var(--border-radius);
      padding: 30px;
      max-width: 500px;
      width: 90%;
      color: white;
      transform: scale(0.8);
      transition: transform 0.4s ease;
    }

    .cosmic-modal.active .modal-content {
      transform: scale(1);
    }

    .modal-close {
      background: none;
      border: none;
      color: white;
      font-size: 24px;
      position: absolute;
      top: 15px;
      right: 20px;
      cursor: pointer;
    }

    .modal-footer {
      text-align: center;
      margin-top: 20px;
    }

    .modal-btn {
      padding: 10px 20px;
      background: var(--accent-gold);
      color: black;
      border: none;
      border-radius: 20px;
      font-weight: bold;
      cursor: pointer;
    }

    /* ====== АДАПТИВНОСТЬ ====== */
    @media (max-width: 768px) {
      .planet-title {
        font-size: 12px;
      }

      .planet-emoji {
        font-size: 24px;
      }

      .modal-content {
        padding: 20px;
      }
    }

    @media (max-width: 480px) {
      .intro-lang-btn {
        font-size: 12px;
        padding: 6px 10px;
      }

      .skip-btn {
        font-size: 14px;
        padding: 10px 20px;
      }
    }
  </style>
</head>
<body>

  <!-- 🌌 КОСМИЧЕСКОЕ ИНТРО -->
  <div id="cosmic-intro" class="active">
    <div class="intro-language-selector">
      <button class="intro-lang-btn active" data-lang="en">EN</button>
      <button class="intro-lang-btn" data-lang="ru">RU</button>
      <button class="intro-lang-btn" data-lang="uk">UK</button>
    </div>

    <div class="cosmic-planets-container" id="planetsContainer"></div>

    <button id="skip-intro" class="skip-btn">Go to DApp</button>

    <!-- Модальное окно -->
    <div id="cosmic-modal" class="cosmic-modal">
      <div class="modal-content">
        <button class="modal-close">&times;</button>
        <h2 id="modal-title"></h2>
        <p id="modal-text"></p>
        <div class="modal-footer">
          <button id="modal-back" class="modal-btn">Back</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 🧠 ПЕРЕВОДЫ (inline) -->
  <script>
    const translations = {
      en: {
        club: { title: "GlobalWay Club", text: "A living ecosystem where generations connect." },
        mission: { title: "Our Mission", text: "Building a fair economy for everyone." },
        goals: { title: "Club Goals", text: "Creating personal income sources." },
        roadmap: { title: "Roadmap", text: "2025 — platform launch and 8 projects." },
        projects: { title: "Our Projects", text: "CardGift, GlobalTub, GlobalMarket..." },
        skipButton: "Go to DApp"
      },
      ru: {
        club: { title: "Клуб GlobalWay", text: "Живая экосистема, где поколения соединяются." },
        mission: { title: "Наша Миссия", text: "Мы строим справедливую экономику." },
        goals: { title: "Цели Клуба", text: "Создавать личные источники дохода." },
        roadmap: { title: "Дорожная Карта", text: "2025 — запуск платформы и 8 проектов." },
        projects: { title: "Наши Проекты", text: "CardGift, GlobalTub, GlobalMarket..." },
        skipButton: "Перейти к DApp"
      },
      uk: {
        club: { title: "Клуб GlobalWay", text: "Жива екосистема, де покоління з'єднуються." },
        mission: { title: "Наша Місія", text: "Ми будуємо справедливу економіку." },
        goals: { title: "Цілі Клубу", text: "Створювати особисті джерела доходу." },
        roadmap: { title: "Дорожня Карта", text: "2025 — запуск платформи та 8 проєктів." },
        projects: { title: "Наші Проєкти", text: "CardGift, GlobalTub, GlobalMarket..." },
        skipButton: "Перейти до DApp"
      }
    };
  </script>

  <!-- 🪐 СКРИПТ ИНТРО -->
  <script>
    let currentLang = 'en';
    let planets = [];

    function createPlanets() {
      const container = document.getElementById('planetsContainer');
      container.innerHTML = '';
      planets = [];

      const data = [
        { id: 'club', color: '#4CAF50', size: 120, emoji: '🌍' },
        { id: 'mission', color: '#2196F3', size: 100, emoji: '🚀' },
        { id: 'goals', color: '#FF9800', size: 110, emoji: '⭐' },
        { id: 'roadmap', color: '#9C27B0', size: 95, emoji: '🛣️' },
        { id: 'projects', color: '#F44336', size: 105, emoji: '🔮' }
      ];

      data.forEach((p, i) => {
        const el = document.createElement('div');
        el.className = 'cosmic-planet';
        el.dataset.topic = p.id;
        el.style.width = p.size + 'px';
        el.style.height = p.size + 'px';
        el.style.background = `radial-gradient(circle at 30% 30%, ${p.color}dd, ${p.color}66)`;
        el.style.borderRadius = '50%';
        el.style.boxShadow = `0 0 20px ${p.color}66`;
        el.innerHTML = `
          <div class="planet-emoji">${p.emoji}</div>
          <div class="planet-title">${translations[currentLang][p.id].title}</div>
        `;
        container.appendChild(el);
        planets.push({ element: el, ...p });
      });

      positionPlanets();
    }

    function positionPlanets() {
      const cw = window.innerWidth;
      const ch = window.innerHeight;
      planets.forEach((p, i) => {
        const angle = (i / planets.length) * Math.PI * 2;
        const radius = Math.min(cw, ch) * 0.25;
        const x = cw / 2 + Math.cos(angle) * radius + (Math.random() - 0.5) * 100;
        const y = ch / 2 + Math.sin(angle) * radius + (Math.random() - 0.5) * 100;
        p.element.style.left = (x - p.size / 2) + 'px';
        p.element.style.top = (y - p.size / 2) + 'px';
      });
    }

    function animatePlanets() {
      function loop() {
        planets.forEach(p => {
          const x = parseFloat(p.element.style.left) + (Math.random() - 0.5) * 0.5;
          const y = parseFloat(p.element.style.top) + (Math.random() - 0.5) * 0.5;
          p.element.style.left = x + 'px';
          p.element.style.top = y + 'px';
        });
        requestAnimationFrame(loop);
      }
      loop();
    }

    function showModal(topic) {
      const modal = document.getElementById('cosmic-modal');
      const title = document.getElementById('modal-title');
      const text = document.getElementById('modal-text');
      title.textContent = translations[currentLang][topic].title;
      text.textContent = translations[currentLang][topic].text;
      modal.classList.add('active');
    }

    function hideModal() {
      document.getElementById('cosmic-modal').classList.remove('active');
    }

    function hideIntro() {
      const intro = document.getElementById('cosmic-intro');
      intro.classList.add('hidden');
      setTimeout(() => {
        intro.style.display = 'none';
        document.querySelector('.app-container').style.display = 'flex';
      }, 1000);
    }

    document.addEventListener('click', e => {
      const planet = e.target.closest('.cosmic-planet');
      if (planet) {
        showModal(planet.dataset.topic);
      }
    });

    document.querySelector('.modal-close').addEventListener('click', hideModal);
    document.getElementById('modal-back').addEventListener('click', hideModal);
    document.getElementById('skip-intro').addEventListener('click', hideIntro);

    document.querySelectorAll('.intro-lang-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        currentLang = e.target.dataset.lang;
        localStorage.setItem('selectedLanguage', currentLang);
        document.querySelectorAll('.intro-lang-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        createPlanets();
        document.getElementById('skip-intro').textContent = translations[currentLang].skipButton;
      });
    });

    window.addEventListener('resize', positionPlanets);

    createPlanets();
    animatePlanets();
  </script>

  <!-- ====== ОСНОВНОЙ КАБИНЕТ (PLACEHOLDER) ====== -->
  <div class="app-container">
    <header style="padding: 20px; background: rgba(26,26,46,0.95); text-align: center;">
      <h1>Welcome to GlobalWay DApp</h1>
      <p>Connect your wallet to continue</p>
    </header>
    <main style="padding: 20px;">
      <p>Here will be your Dashboard, Matrix, Tokens, etc.</p>
    </main>
  </div>

</body>
</html>
